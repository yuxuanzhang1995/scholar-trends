name: refresh trending

on:
  schedule:
    - cron: "0 6 * * *"   # daily, 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scrape Scirate -> trending.json
        run: python scripts/refresh_trending.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- trending.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add trending.json
            git commit -m "chore: refresh trending snapshot"
            git push
          else
            echo "trending.json unchanged"
          fi
