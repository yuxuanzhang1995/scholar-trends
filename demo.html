      return '<div class="prob"><div class="meta"><span class="tag2">'+(x.year||'—')+'</span>'+(g.length?' '+typeBadges(g):'')+(x.cites?' <span class="tysec">'+x.cites+' cites</span>':'')+'</div>'
        + '<p class="ask">“'+esc(x.sentence)+'”</p>'
        + '<div class="src">📄 <a href="'+link+'" target="_blank" rel="noopener">'+esc((x.title||'source').slice(0,95))+'</a></div></div>';
    }).join('');
  }
  function problemQuery(){
    var d=document.createElement('div'); d.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%';
    var inp=document.createElement('input'); inp.className='dq'; inp.type='text'; inp.placeholder='paper title, DOI, author, or keyword…';
    inp.style.cssText='font-size:14px;padding:8px 11px;border-radius:9px;border:1px solid var(--line);min-width:230px;flex:1;background:var(--surface);color:var(--ink)';
    var k=document.createElement('select'); k.className='dk'; [['paper','paper title'],['doi','DOI'],['author','author'],['keyword','keyword']].forEach(function(x){ var o=document.createElement('option'); o.value=x[0]; o.textContent=x[1]; k.appendChild(o); });
    var find=document.createElement('button'); find.className='run'; find.textContent='find directions';
    find.onclick=function(){ find.disabled=true; find.textContent='searching…'; Promise.resolve(runDirections()).then(function(){ find.disabled=false; find.textContent='find directions'; }); };
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter') find.click(); });
    var cur=document.createElement('button'); cur.textContent='curated'; cur.style.cssText='font-size:13px;padding:8px 12px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer';
    cur.onclick=function(){ inp.value=''; renderProblems('all'); };
    d.appendChild(inp); d.appendChild(k); d.appendChild(find); d.appendChild(cur);
    return d;
  }
  function authorBox(){
    var d=document.createElement('div'); d.style.cssText='display:flex;flex-direction:column;gap:7px;width:100%';
    var ta=document.createElement('textarea'); ta.className='au'; ta.placeholder='one author per line';
    ta.value='John Preskill\nMikhail Lukin\nPeter Zoller';
    d.appendChild(label('followed authors (one per line)')); d.appendChild(ta); return d;
  }
  function monthsSeg(){ var d=document.createElement('div'); d.className='seg'; [['3','last 3 mo'],['6','last 6 mo'],['12','last 12 mo']].forEach(function(x){ var b=document.createElement('button'); b.textContent=x[1]; b.dataset.mo=x[0]; if(x[0]==='6')b.className='on'; b.onclick=function(){ d.querySelectorAll('button').forEach(function(z){z.className='';}); b.className='on'; }; d.appendChild(b); }); return d; }
  function normT(t){ return (t||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
  function dgAuthors(w, idset){ var a=w.authorships||[]; var names=a.slice(0,4).map(function(x){ var id=((x.author||{}).id||'').split('/').pop(); var nm=esc((x.author||{}).display_name||'?'); return idset[id]?'<span class="dg-foll">'+nm+'</span>':nm; }); return names.join(', ')+(a.length>4?' +'+(a.length-4):''); }
  function dgItem(w, idset){ var ven=((w.primary_location||{}).source||{}).display_name||''; return '<div class="dg-item"><a class="t" href="'+(w.doi||w.id)+'" target="_blank" rel="noopener">'+esc(w.title||'?')+'</a><div class="meta2">'+(w.publication_date||'')+(ven?' · '+esc(ven.slice(0,40)):'')+(w.cited_by_count?' · '+w.cited_by_count+' cites':'')+' · '+dgAuthors(w,idset)+'</div></div>'; }
  function resolvedNote(ok, miss){ var s='<div class="note" style="margin-top:16px">resolved: '+ok.map(function(a){return esc(a.disp)+(a.topic?' <span style="opacity:.7">['+esc(a.topic.slice(0,26))+']</span>':'')+(a.inst?' <span style="opacity:.55">('+esc(a.inst.slice(0,22))+')</span>':'');}).join(' · '); if(miss.length)s+='<br><span style="color:#993c1d">unmatched: '+miss.map(function(a){return esc(a.name);}).join(', ')+'</span>'; s+='<br><span style="opacity:.6">Wrong person, or a common name? OpenAlex author matching is noisy — paste the OpenAlex author ID (e.g. A5066245772) or an ORCID on that line to pin it.</span>'; return s+'</div>'; }
  function runDigest(){
    var names=ctrl.querySelector('textarea.au').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
    if(!names.length){ res.innerHTML='<div class="err">paste at least one author name.</div>'; return Promise.resolve(); }
    if(names.length>30){ names=names.slice(0,30); }
    var mo=+ctrl.querySelector('.seg button.on').dataset.mo;
    var win=',from_publication_date:'+new Date(Date.now()-mo*30*864e5).toISOString().slice(0,10);
    note.textContent='resolving '+names.length+' author(s)…'; res.innerHTML='<div class="hint">resolving authors & pulling recent papers…</div>';
    function pickAuthor(nm){
      var orc=(nm.match(/(\d{4}-\d{4}-\d{4}-\d{3}[\dxX])/)||[])[1];
      var idm=(nm.match(/^A\d{6,}$/i)||[])[0];
      var p = idm ? oa('authors/'+idm.toUpperCase(),{}).then(function(r){return {results:[r]};})
            : orc ? oa('authors/orcid:'+orc,{}).then(function(r){return {results:[r]};})
            : oa('authors',{search:nm,per_page:5});
      return p.then(function(a){ var rs=(a.results||[]).filter(function(r){return r&&r.id;}); if(!rs.length) return {name:nm,id:null}; rs.sort(function(x,y){return (y.cited_by_count||0)-(x.cited_by_count||0);}); var r=rs[0]; return {name:nm,id:r.id.split('/').pop(),disp:r.display_name,inst:((r.last_known_institutions||[])[0]||{}).display_name||'',topic:((r.topics||[])[0]||{}).display_name||''}; }, function(){return {name:nm,id:null};});
    }
    return Promise.all(names.map(pickAuthor)).then(function(authors){
      var ok=authors.filter(function(a){return a.id;}), miss=authors.filter(function(a){return !a.id;});
      if(!ok.length){ note.textContent=''; res.innerHTML='<div class="err">couldn’t match any of those names on OpenAlex.</div>'+resolvedNote(ok,miss); return; }
      var idset={}; ok.forEach(function(a){idset[a.id]=1;});
      return Promise.all(ok.map(function(a){ return oa('works',{filter:'author.id:'+a.id+win,per_page:25,select:'id,title,publication_date,cited_by_count,primary_topic,authorships,primary_location,doi'}).then(function(w){return w.results||[];}); })).then(function(lists){
        var byT={};
        lists.forEach(function(ws){ ws.forEach(function(w){ var k=normT(w.title); if(!k)return; var cur=byT[k]; if(!cur){ byT[k]=w; } else { var curArx=/arxiv/i.test(((cur.primary_location||{}).source||{}).display_name||''); var newArx=/arxiv/i.test(((w.primary_location||{}).source||{}).display_name||''); if(curArx&&!newArx) byT[k]=w; } }); });
        var items=Object.keys(byT).map(function(k){return byT[k];});
        if(!items.length){ note.textContent=''; res.innerHTML='<div class="hint">no papers from those authors in the last '+mo+' months — widen the window.</div>'+resolvedNote(ok,miss); return; }
        var clusters={}; items.forEach(function(w){ var t=((w.primary_topic||{}).display_name)||'Other'; (clusters[t]=clusters[t]||[]).push(w); });
        var groups=Object.keys(clusters).sort(function(a,b){return clusters[b].length-clusters[a].length;});
        groups.forEach(function(g){ clusters[g].sort(function(a,b){return (b.publication_date||'').localeCompare(a.publication_date||'');}); });
        note.textContent='Last '+mo+' months · '+items.length+' papers from '+ok.length+' author(s), grouped by topic · deduped';
        var html=groups.map(function(g){ return '<div class="dg-grp">'+esc(g)+' <span style="color:var(--faint);font-weight:400">('+clusters[g].length+')</span></div>'+clusters[g].map(function(w){return dgItem(w,idset);}).join(''); }).join('');
        html+='<div id="discbox"><div class="hint" style="margin-top:16px">finding related work beyond your follows…</div></div>';
        res.innerHTML=html+resolvedNote(ok,miss);
        var tc={}; items.forEach(function(w){ var tid=((w.primary_topic||{}).id||'').split('/').pop(); if(tid)tc[tid]=(tc[tid]||0)+1; });
        var top=Object.keys(tc).sort(function(a,b){return tc[b]-tc[a];}).slice(0,3); var seen={}; items.forEach(function(w){seen[normT(w.title)]=1;});
        return Promise.all(top.map(function(tid){ return oa('works',{filter:'primary_topic.id:'+tid+win,sort:'cited_by_count:desc',per_page:10,select:'id,title,publication_date,cited_by_count,primary_topic,authorships,primary_location,doi'}).then(function(w){return w.results||[];}); })).then(function(dl){
          var picked={}, out=[]; dl.forEach(function(ws){ws.forEach(function(w){ var k=normT(w.title); if(!k||seen[k]||picked[k])return; if((w.authorships||[]).some(function(x){return idset[((x.author||{}).id||'').split('/').pop()];}))return; picked[k]=1; out.push(w); });});
          out.sort(function(a,b){return (b.cited_by_count||0)-(a.cited_by_count||0);}); out=out.slice(0,8);
          var box=document.getElementById('discbox'); if(!box)return;
          box.innerHTML = out.length ? ('<div class="dg-disc"><div class="dg-grp" style="margin-top:0">↗ related — top-cited recent work in your authors’ topics, NOT from your follows</div>'+out.map(function(w){return dgItem(w,idset);}).join('')+'</div>') : '';
        });
      });
    }).catch(function(e){ note.textContent=''; res.innerHTML='<div class="err"><b>OpenAlex is congested right now.</b> Try again in a moment, or shorten the author list. ('+esc(e.message||'error')+')</div>'; });
  }
  var DEMOS={
    trends:{ desc:'Track any keyword across journals over a chosen window — fuzzy text or synonym-aware concept.', build:function(){ ctrl.appendChild(kwInput()); ctrl.appendChild(modeSeg()); ctrl.appendChild(journalChecks(['PRX Quantum','npj Quantum Information','Quantum'])); ctrl.appendChild(yearRange(2020,2025)); ctrl.appendChild(runBtn(runTrends)); runTrends(); } },
    topic:{ desc:"A topic's rise or fade across all literature (arXiv + journals) over a chosen window.", build:function(){ ctrl.appendChild(kwInput()); ctrl.appendChild(modeSeg()); ctrl.appendChild(yearRange(2015,2025)); ctrl.appendChild(runBtn(runTopicTrend)); runTopicTrend(); } },
    impact:{ desc:'Average citations of two topics and their intersection — spot synergy.', build:function(){ ctrl.appendChild(label('topic A')); ctrl.appendChild(sel(Object.keys(TOPICS))); ctrl.appendChild(label('topic B')); var b=sel(Object.keys(TOPICS)); b.selectedIndex=1; ctrl.appendChild(b); ctrl.appendChild(runBtn(runImpact)); } },
    who:{ desc:'Who produces the most work on a topic, by region or country.', build:function(){ ctrl.appendChild(label('topic')); ctrl.appendChild(sel(Object.keys(TOPICS))); ctrl.appendChild(seg()); ctrl.appendChild(runBtn(runWho)); } },
    venue:{ desc:'A venue’s tier, real impact factor and OpenAlex stats.', build:function(){ ctrl.appendChild(label('journal')); ctrl.appendChild(sel(Object.keys(JOURNALS))); ctrl.appendChild(runBtn(runVenue)); } },
    trending:{ desc:"What's trending on arXiv right now by Scirate scites — a composite of paper count × community upvotes.", build:function(){ ctrl.appendChild(label('window')); ctrl.appendChild(winSeg()); renderTrending('month'); } },
    problems:{ desc:"Open problems & research directions — search by paper title, DOI, author, or keyword to pull the open questions recent papers actually flag, or browse the curated, literature-verified list below.", build:function(){ ctrl.appendChild(problemQuery()); ctrl.appendChild(label('or curated:')); ctrl.appendChild(problemFilter()); renderProblems('all'); } },
    digest:{ desc:"Turn your Google-Scholar follows into one feed: paste the authors you follow → their recent papers, deduped and grouped by topic, plus related work you’re NOT following (the “related articles” a per-author email can’t give you). Live OpenAlex.", build:function(){ ctrl.appendChild(authorBox()); ctrl.appendChild(label('window')); ctrl.appendChild(monthsSeg()); ctrl.appendChild(runBtn(runDigest)); runDigest(); } }
  };
  function label(t){ var l=document.createElement('label'); l.className='lab'; l.textContent=t; return l; }
  function seg(){ var d=document.createElement('div'); d.className='seg'; ['continent','country'].forEach(function(x,i){ var b=document.createElement('button'); b.textContent=x; b.dataset.dim=x; if(i===0)b.className='on'; b.onclick=function(){ d.querySelectorAll('button').forEach(function(z){z.className='';}); b.className='on'; }; d.appendChild(b); }); return d; }
  function kwInput(){ var d=document.createElement('div'); d.style.cssText='display:flex;flex-direction:column;gap:7px;width:100%';
    var top=document.createElement('div'); top.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap';
    var inp=document.createElement('input'); inp.className='kw'; inp.type='text'; inp.placeholder='e.g. error correction'; inp.value='error correction';
    inp.style.cssText='font-size:14px;padding:8px 11px;border-radius:9px;border:1px solid var(--line);min-width:220px;background:var(--surface);color:var(--ink)';
    top.appendChild(label('keyword')); top.appendChild(inp);
    var chips=document.createElement('div'); chips.style.cssText='display:flex;gap:6px;flex-wrap:wrap';
    ['error correction','machine learning','error mitigation','variational','quantum advantage','tensor network'].forEach(function(s){ var c=document.createElement('button'); c.type='button'; c.textContent=s; c.style.cssText='font-size:11.5px;padding:3px 10px;border-radius:999px;border:1px solid var(--line);background:var(--bg);color:var(--muted);cursor:pointer'; c.onclick=function(){ inp.value=s; }; chips.appendChild(c); });
    d.appendChild(top); d.appendChild(chips); return d;
  }
  function modeSeg(){ var d=document.createElement('div'); d.className='seg'; [['text','text (fuzzy)'],['concept','concept (synonyms)']].forEach(function(x,i){ var b=document.createElement('button'); b.textContent=x[1]; b.dataset.mode=x[0]; if(i===0)b.className='on'; b.onclick=function(){ d.querySelectorAll('button').forEach(function(z){z.className='';}); b.className='on'; }; d.appendChild(b); }); return d; }
  function journalChecks(def){ var d=document.createElement('div'); d.style.cssText='display:flex;gap:9px 12px;flex-wrap:wrap;width:100%;margin-top:2px';
    var order=['Quantum','Physics','Multidisciplinary','Reviews','ML / AI conf.','Theory conf.'], byGrp={};
    Object.keys(JOURNALS).forEach(function(n){ var g=VGRP[n]||'Other'; (byGrp[g]=byGrp[g]||[]).push(n); });
    order.forEach(function(g){ if(!byGrp[g]) return;
      var h=document.createElement('div'); h.className='grphead'; h.textContent=g; d.appendChild(h);
      byGrp[g].forEach(function(name){ var lab=document.createElement('label'); lab.style.cssText='font-size:12.5px;color:var(--muted);display:flex;gap:5px;align-items:center;cursor:pointer';
        var cb=document.createElement('input'); cb.type='checkbox'; cb.className='jr'; cb.value=name; if(def.indexOf(name)>=0)cb.checked=true; lab.appendChild(cb); lab.appendChild(document.createTextNode(name)); d.appendChild(lab); });
    });
    return d;
  }
  function show(name){
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.d===name); });
    ctrl.innerHTML=''; res.innerHTML='<div class="hint">pick options and press run.</div>'; note.textContent='';
    if(chart){ chart.destroy(); chart=null; }
    descEl.textContent=DEMOS[name].desc; DEMOS[name].build();
  }
  document.getElementById('tabs').addEventListener('click', function(e){ if(e.target.dataset.d) show(e.target.dataset.d); });
  show('trends');
})();
</script>
